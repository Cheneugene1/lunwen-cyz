name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  offline-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Offline tests
        run: PYTHONIOENCODING=utf-8 python tests/run_offline.py
      - name: Config schema check
        run: PYTHONIOENCODING=utf-8 python tests/config_schema_check.py
      - name: Unit tests
        run: PYTHONIOENCODING=utf-8 python -m pytest tests/unit/ -v
